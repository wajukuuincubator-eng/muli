<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeWorld Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        .wa-dark { background-color: #0b141a; }
        .wa-sidebar { background-color: #111b21; border-right: 1px solid #222d34; }
        .wa-message-me { background-color: #005c4b; color: #e9edef; border-radius: 10px 0 10px 10px; }
        .wa-message-them { background-color: #202c33; color: #e9edef; border-radius: 0 10px 10px 10px; }
        .wa-header { background-color: #202c33; }
    </style>
</head>
<body class="h-screen flex flex-col wa-dark text-[#e9edef] font-sans overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 bg-[#111b21] flex flex-col items-center justify-center p-6">
        <div class="bg-[#202c33] p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-700">
            <h1 class="text-3xl font-bold mb-2 text-green-500">VibeWorld</h1>
            <p class="text-gray-400 text-sm mb-6">Enter details to start encrypted session</p>
            
            <div class="space-y-4 mb-6 text-left">
                <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Your Details</label>
                <div class="flex gap-2">
                    <input id="my-country" type="text" placeholder="+254" class="w-20 bg-[#2a3942] p-3 rounded-lg text-sm outline-none border-none">
                    <input id="my-local-num" type="tel" placeholder="Your Number" class="flex-1 p-3 bg-[#2a3942] rounded-lg outline-none">
                </div>
                <input id="my-email" type="email" placeholder="Your Email (Login Alert)" class="w-full p-3 bg-[#2a3942] rounded-lg outline-none">
                
                <hr class="border-gray-700 my-4">
                
                <label class="text-[10px] uppercase text-gray-500 font-bold ml-1">Connect to Receiver</label>
                <input id="dest-num" type="tel" placeholder="Receiver Full Number (e.g. 254...)" class="w-full p-3 border-2 border-green-900 bg-[#2a3942] rounded-lg outline-none">
            </div>
            
            <button onclick="globalLogin()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold transition uppercase">
                Login & Start Chat
            </button>
        </div>
    </div>

    <div id="app-interface" class="flex h-full hidden">
        <aside class="w-full md:w-1/4 wa-sidebar flex flex-col">
            <header class="p-4 bg-[#202c33] border-b border-gray-800">
                <p id="my-id-label" class="text-xs text-green-500 font-bold uppercase"></p>
                <p id="my-email-label" class="text-[10px] opacity-50 truncate"></p>
            </header>
            <div class="p-4 bg-[#2a3942] border-l-4 border-green-500 mt-2">
                <p id="active-target-display" class="text-sm font-bold truncate"></p>
                <p class="text-[10px] text-gray-400">Secure Connection Established</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="p-4 wa-header flex justify-between items-center shadow-lg">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">👤</div>
                    <h2 id="chat-header-name" class="font-bold text-sm">...</h2>
                </div>
                <button onclick="initCall()" class="text-xl px-4 text-gray-400 hover:text-white transition">📞</button>
            </header>
            
            <div id="message-container" class="flex-1 p-6 overflow-y-auto flex flex-col gap-3" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a;"></div>
            
            <footer class="p-4 wa-header flex gap-3">
                <input id="chat-input" type="text" placeholder="Keep the vibe going..." class="flex-1 bg-[#2a3942] p-3 rounded-xl outline-none text-sm">
                <button onclick="sendVibe()" class="text-green-500 font-bold px-4">SEND</button>
            </footer>
        </main>
    </div>

    <div id="call-ui" class="fixed inset-0 bg-black hidden z-[100] flex flex-col items-center justify-center">
        <video id="remote-stream" autoplay class="w-full h-full object-cover"></video>
        <button onclick="location.reload()" class="absolute bottom-10 bg-red-600 p-6 rounded-full text-white shadow-xl">END CALL</button>
    </div>

    <script>
        let peer, conn, myFullNum, targetNum;
        const SERVICE_ID = "service_e482kwr"; // Your Service ID
        const PUBLIC_KEY = "YOUR_PUBLIC_KEY"; // Replace with your Public Key
        const TEMPLATE_ID = "YOUR_TEMPLATE_ID"; // Replace with your Template ID

        emailjs.init(PUBLIC_KEY);

        function globalLogin() {
            const country = document.getElementById('my-country').value.replace('+', '');
            const local = document.getElementById('my-local-num').value;
            const email = document.getElementById('my-email').value;
            targetNum = document.getElementById('dest-num').value.replace('+', '');

            if(!local || !email || !targetNum) return alert("All fields are required!");

            myFullNum = country + local;
            peer = new Peer(myFullNum);

            peer.on('open', id => {
                localStorage.setItem('vibe_user', JSON.stringify({num: id, email: email, country: country}));
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-interface').classList.remove('hidden');
                document.getElementById('my-id-label').innerText = "+" + id;
                document.getElementById('my-email-label').innerText = email;
                document.getElementById('active-target-display').innerText = "+" + targetNum;
                document.getElementById('chat-header-name').innerText = "+" + targetNum;

                sendEmailAlert(email, id);
                connectToReceiver(targetNum);
            });

            peer.on('connection', c => {
                conn = c;
                setupChat();
            });

            peer.on('call', call => {
                if(confirm("Incoming Global Call. Answer?")) {
                    navigator.mediaDevices.getUserMedia({audio: true, video: true}).then(s => {
                        call.answer(s);
                        showCall(call);
                    });
                }
            });
        }

        function connectToReceiver(id) {
            conn = peer.connect(id);
            conn.on('open', setupChat);
        }

        function setupChat() {
            conn.on('data', data => displayMessage(data, 'them'));
        }

        function sendEmailAlert(email, id) {
            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                to_email: email,
                message: `Active session for +${id} has started.`
            }).then(() => console.log("Login notification sent."));
        }

        function sendVibe() {
            const val = document.getElementById('chat-input').value;
            if(conn && val) {
                conn.send(val);
                displayMessage(val, 'me');
                document.getElementById('chat-input').value = '';
            }
        }

        function displayMessage(text, sender) {
            const box = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = `p-3 px-5 max-w-[80%] text-sm shadow-lg ${sender === 'me' ? 'wa-message-me self-end' : 'wa-message-them self-start'}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function initCall() {
            navigator.mediaDevices.getUserMedia({audio: true, video: true}).then(s => {
                const call = peer.call(conn.peer, s);
                showCall(call);
            });
        }

        function showCall(call) {
            document.getElementById('call-ui').classList.remove('hidden');
            call.on('stream', s => document.getElementById('remote-stream').srcObject = s);
        }

        // AUTO-RECOGNITION ON LOAD
        window.onload = () => {
            const saved = localStorage.getItem('vibe_user');
            if(saved) {
                const user = JSON.parse(saved);
                document.getElementById('my-country').value = "+" + (user.country || "");
                document.getElementById('my-local-num').value = user.num.replace(user.country, "");
                document.getElementById('my-email').value = user.email;
            }
        };
    </script>
</body>
</html>
