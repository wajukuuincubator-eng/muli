<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>VibeWorld</title> <script src="https://cdn.tailwindcss.com"></script> <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> <style> body{ background:#0b141a; color:#e9edef; } .chatbg{ background-image:url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png"); background-blend-mode:overlay; background-color:#0b141a; } </style> </head> <body class="h-screen flex flex-col"> <!-- LOGIN --> <div id="login" class="fixed inset-0 bg-[#111b21] flex items-center justify-center p-4"> <div class="bg-[#202c33] p-6 rounded-xl w-full max-w-sm"> <h1 class="text-3xl text-green-500 font-bold text-center mb-6"> VibeWorld </h1> <div class="space-y-4"> <div class="flex gap-2"> <input id="country" placeholder="+254" class="w-20 bg-[#2a3942] p-3 rounded outline-none"> <input id="number" placeholder="Your Number" class="flex-1 bg-[#2a3942] p-3 rounded outline-none"> </div> <button onclick="login()" class="w-full bg-green-600 p-3 rounded font-bold"> Activate </button> </div> </div> </div> <!-- APP --> <div id="app" class="hidden flex flex-col md:flex-row h-full"> <!-- CONTACTS --> <div class="md:w-1/3 bg-[#111b21] border-r border-gray-800 flex flex-col"> <header class="p-3 bg-[#202c33] flex justify-between items-center"> <span id="myid" class="text-green-400 text-sm font-bold"></span> <button onclick="logout()" class="text-red-400 text-xs"> Logout </button> </header> <div class="p-2 border-b border-gray-800 flex gap-2"> <input id="target" placeholder="Enter number" class="flex-1 bg-[#2a3942] p-2 rounded text-sm outline-none"> <button onclick="startChat()" class="bg-green-600 px-3 rounded text-xs"> CHAT </button> </div> <div id="contacts" class="flex-1 overflow-y-auto"> </div> </div> <!-- CHAT AREA --> <div class="flex-1 flex flex-col"> <header class="p-3 bg-[#202c33]"> <h2 id="chatname" class="text-sm font-bold"> No chat selected </h2> </header> <div id="messages" class="flex-1 overflow-y-auto p-4 chatbg flex flex-col gap-2"> </div> <footer class="p-3 bg-[#202c33] flex gap-2"> <input id="msg" placeholder="Type message" class="flex-1 bg-[#2a3942] p-3 rounded outline-none text-sm"> <button onclick="send()" class="text-green-400 font-bold"> SEND </button> </footer> </div> </div> <script> let peer let conn let active let db=JSON.parse(localStorage.getItem("vibe_db")||'{"me":null,"chats":{}}') window.onload=()=>{ if(db.me){ document.getElementById("login").style.display="none" startPeer(db.me) } } function login(){ let country=document.getElementById("country").value.replace("+","") let num=document.getElementById("number").value if(!num) return alert("Enter number") let id=country+num db.me=id save() document.getElementById("login").style.display="none" startPeer(id) } function startPeer(id){ peer=new Peer(id) document.getElementById("app").classList.remove("hidden") document.getElementById("myid").innerText="+"+id renderContacts() peer.on("connection",c=>{ conn=c setup(c.peer) }) } function startChat(){ let id=document.getElementById("target").value.replace("+","") if(!id) return if(!db.chats[id]) db.chats[id]=[] save() openChat(id) } function openChat(id){ active=id document.getElementById("chatname").innerText="+"+id let box=document.getElementById("messages") box.innerHTML="" ;(db.chats[id]||[]).forEach(m=>{ msgUI(m.text,m.sender) }) conn=peer.connect(id) conn.on("open",()=>{ setup(id) }) } function setup(id){ conn.on("data",data=>{ store(id,data,"them") if(active===id) msgUI(data,"them") renderContacts() }) } function send(){ let val=document.getElementById("msg").value if(!val||!conn?.open) return conn.send(val) store(active,val,"me") msgUI(val,"me") document.getElementById("msg").value="" renderContacts() } function store(id,text,sender){ if(!db.chats[id]) db.chats[id]=[] db.chats[id].push({text,sender}) save() } function msgUI(text,sender){ let div=document.createElement("div") div.className= sender==="me" ?"bg-[#005c4b] self-end p-3 rounded-xl max-w-[80%]" :"bg-[#202c33] self-start p-3 rounded-xl max-w-[80%]" div.innerText=text let box=document.getElementById("messages") box.appendChild(div) box.scrollTop=box.scrollHeight } function renderContacts(){ let list=document.getElementById("contacts") list.innerHTML="" Object.keys(db.chats).reverse().forEach(id=>{ let last=db.chats[id].slice(-1)[0]?.text||"" let div=document.createElement("div") div.className="p-3 border-b border-gray-800 cursor-pointer" div.innerHTML= <p class="font-bold text-sm">+${id}</p> <p class="text-xs text-gray-400 truncate">${last}</p> div.onclick=()=>openChat(id) list.appendChild(div) }) } function save(){ localStorage.setItem("vibe_db",JSON.stringify(db)) } function logout(){ localStorage.removeItem("vibe_db") location.reload() } </script> </body> </html>
