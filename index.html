<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeWorld Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background-color: #0b141a; color: #e9edef; }
        .wa-chat-bg { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay; background-color: #0b141a;
        }
        /* Fix for mobile keyboard pushing content */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 bg-[#111b21] flex items-center justify-center p-4">
        <div class="bg-[#202c33] p-6 rounded-2xl w-full max-w-sm border border-gray-700 shadow-2xl">
            <h1 class="text-3xl font-bold mb-4 text-green-500 text-center">VibeWorld</h1>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input id="my-country" type="text" placeholder="+254" class="w-20 bg-[#2a3942] p-3 rounded-lg outline-none">
                    <input id="my-local-num" type="tel" placeholder="Your Number" class="flex-1 p-3 bg-[#2a3942] rounded-lg outline-none">
                </div>
                <input id="my-email" type="email" placeholder="Email for Login Alert" class="w-full p-3 bg-[#2a3942] rounded-lg outline-none">
                <hr class="border-gray-700">
                <input id="dest-num" type="tel" placeholder="Receiver Full Number" class="w-full p-3 border-2 border-green-900 bg-[#2a3942] rounded-lg outline-none">
            </div>
            <button onclick="globalLogin()" class="w-full mt-6 bg-green-600 p-3 rounded-lg font-bold uppercase">Start Chat</button>
        </div>
    </div>

    <div id="app-interface" class="hidden flex h-full w-full">
        <aside id="sidebar" class="w-full md:w-1/3 bg-[#111b21] border-r border-gray-800 flex flex-col">
            <header class="p-4 bg-[#202c33] flex justify-between items-center">
                <span class="text-xs font-bold text-green-500">SECURE: ON</span>
                <span id="my-info" class="text-[10px] opacity-50"></span>
            </header>
            <div class="p-4 flex-1">
                <div class="p-3 bg-[#2a3942] rounded-lg border-l-4 border-green-500">
                    <p id="target-display" class="text-sm font-bold"></p>
                    <p id="target-status" class="text-[10px] text-gray-400">OFFLINE</p>
                </div>
                <button onclick="openChatMobile()" class="md:hidden mt-4 w-full bg-green-600 p-2 rounded text-xs">Open Active Chat</button>
            </div>
        </aside>

        <main id="chat-main" class="hidden md:flex flex-1 flex flex-col bg-[#0b141a]">
            <header class="p-3 bg-[#202c33] flex justify-between items-center shadow-lg">
                <div class="flex items-center gap-3">
                    <button onclick="closeChatMobile()" class="md:hidden text-xl">←</button>
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">👤</div>
                    <div>
                        <h2 id="header-name" class="font-bold text-sm">...</h2>
                        <p id="typing-status" class="text-[10px] text-green-500 h-3"></p>
                    </div>
                </div>
                <button onclick="initCall()" class="px-4 text-xl">📞</button>
            </header>

            <div id="message-container" class="flex-1 wa-chat-bg overflow-y-auto p-4 flex flex-col gap-3"></div>

            <footer class="p-3 bg-[#202c33] flex items-center gap-2 safe-area-bottom">
                <input id="chat-input" type="text" placeholder="Type a message..." 
                       class="flex-1 bg-[#2a3942] p-3 rounded-xl outline-none text-sm"
                       oninput="sendTyping()">
                <button onclick="sendVibe()" class="text-green-500 font-bold px-4">SEND</button>
            </footer>
        </main>
    </div>

    <div id="call-ui" class="fixed inset-0 bg-black hidden z-[100] flex flex-col items-center justify-center">
        <video id="remote-stream" autoplay playsinline class="w-full h-full object-cover"></video>
        <button onclick="location.reload()" class="absolute bottom-10 bg-red-600 p-6 rounded-full text-white">END</button>
    </div>

    <script>
        let peer, conn, myFullNum, targetId;
        const SERVICE_ID = "service_e482kwr";

        function globalLogin() {
            const country = document.getElementById('my-country').value.replace('+', '');
            const local = document.getElementById('my-local-num').value;
            const email = document.getElementById('my-email').value;
            targetId = document.getElementById('dest-num').value.replace('+', '');

            if(!local || !targetId) return alert("Numbers are required!");
            myFullNum = country + local;

            peer = new Peer(myFullNum);

            peer.on('open', id => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-interface').classList.remove('hidden');
                document.getElementById('my-info').innerText = "+" + id;
                document.getElementById('target-display').innerText = "+" + targetId;
                document.getElementById('header-name').innerText = "+" + targetId;
                
                if(window.innerWidth < 768) openChatMobile();
                connectToReceiver(targetId);
                sendEmailAlert(email, id);
            });

            peer.on('connection', c => {
                conn = c;
                setupConnection();
            });

            peer.on('call', call => {
                if(confirm("Incoming Vibe Call...")) {
                    navigator.mediaDevices.getUserMedia({audio: true, video: true}).then(s => {
                        call.answer(s);
                        document.getElementById('call-ui').classList.remove('hidden');
                        call.on('stream', rs => document.getElementById('remote-stream').srcObject = rs);
                    });
                }
            });
        }

        function connectToReceiver(id) {
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('target-status').innerText = "ONLINE";
                document.getElementById('target-status').className = "text-[10px] text-green-500 font-bold";
                setupConnection();
            });
        }

        function setupConnection() {
            conn.on('data', data => {
                if(data === "TYPING") document.getElementById('typing-status').innerText = "typing...";
                else if(data === "STOPPED") document.getElementById('typing-status').innerText = "";
                else {
                    displayMessage(data, 'them');
                    document.getElementById('typing-status').innerText = "";
                }
            });
        }

        function sendTyping() {
            if(conn?.open) {
                conn.send("TYPING");
                clearTimeout(window.tTimer);
                window.tTimer = setTimeout(() => conn.send("STOPPED"), 2000);
            }
        }

        function sendVibe() {
            const val = document.getElementById('chat-input').value;
            if(conn?.open && val) {
                conn.send(val);
                displayMessage(val, 'me');
                document.getElementById('chat-input').value = '';
            }
        }

        function displayMessage(text, sender) {
            const box = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = `p-3 px-5 max-w-[85%] text-sm shadow-lg ${sender === 'me' ? 'bg-[#005c4b] self-end rounded-l-lg rounded-br-lg' : 'bg-[#202c33] self-start rounded-r-lg rounded-bl-lg'}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function openChatMobile() {
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('chat-main').classList.remove('hidden');
            document.getElementById('chat-main').classList.add('flex');
        }

        function closeChatMobile() {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chat-main').classList.add('hidden');
        }

        function initCall() {
            navigator.mediaDevices.getUserMedia({audio: true, video: true}).then(s => {
                const call = peer.call(targetId, s);
                document.getElementById('call-ui').classList.remove('hidden');
                call.on('stream', rs => document.getElementById('remote-stream').srcObject = rs);
            });
        }

        function sendEmailAlert(email, id) {
            if(!email) return;
            emailjs.send("service_e482kwr", "YOUR_TEMPLATE_ID", {
                to_email: email,
                message: "Logged in as +" + id
            });
        }
    </script>
</body>
</html>
