<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeChat Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .wa-dark { background-color: #111b21; }
        .wa-sidebar { background-color: #111b21; border-right: 1px solid #2f3b44; }
        .wa-chat-bg { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .wa-message-me { background-color: #005c4b; border-radius: 8px 0px 8px 8px; }
        .wa-message-them { background-color: #202c33; border-radius: 0px 8px 8px 8px; }
        .wa-header { background-color: #202c33; }
        .wa-input-bar { background-color: #202c33; }
    </style>
</head>
<body class="h-screen flex bg-[#0b141a] text-[#e9edef] font-sans overflow-hidden">

    <aside id="sidebar" class="w-full md:w-1/3 wa-sidebar flex flex-col z-20">
        <header class="wa-header p-4 flex justify-between items-center">
            <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center font-bold">V</div>
            <div class="flex gap-6 text-gray-400">
                <button onclick="addNewContact()" class="text-xl">➕</button>
                <button class="text-xl">⋮</button>
            </div>
        </header>
        
        <div class="p-3">
            <input type="text" placeholder="Search or start new chat" class="w-full bg-[#2a3942] p-2 rounded-lg text-sm outline-none placeholder-gray-500">
        </div>

        <div id="contact-list" class="flex-1 overflow-y-auto">
            </div>

        <div class="p-4 bg-[#202c33] text-xs">
            Your Vibe Number: <span id="my-id" class="text-green-500 font-mono select-all">Connecting...</span>
        </div>
    </aside>

    <main id="chat-panel" class="hidden md:flex flex-1 flex flex-col relative z-10">
        <header class="wa-header p-3 flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <button onclick="closeChat()" class="md:hidden text-xl mr-2">←</button>
                <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center">👤</div>
                <div>
                    <h2 id="active-contact-name" class="font-semibold text-sm">Select a contact</h2>
                    <p class="text-xs text-green-500">online</p>
                </div>
            </div>
            <div class="flex gap-6 text-xl text-gray-400 mr-2">
                <button onclick="makeCall('video')">📹</button>
                <button onclick="makeCall('audio')">📞</button>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 wa-chat-bg overflow-y-auto p-4 flex flex-col gap-3">
            </div>

        <footer class="wa-input-bar p-3 flex items-center gap-3">
            <input type="file" id="img-upload" class="hidden" accept="image/*" onchange="handleImage(this)">
            <button onclick="document.getElementById('img-upload').click()" class="text-2xl text-gray-400">📎</button>
            <input id="msg-input" type="text" placeholder="Type a message" class="flex-1 bg-[#2a3942] p-2.5 rounded-lg outline-none text-sm">
            <button onclick="sendText()" class="text-green-500 text-2xl">➤</button>
        </footer>
    </main>

    <div id="call-screen" class="fixed inset-0 bg-black hidden z-50 flex flex-col items-center justify-center">
        <video id="remote-video" autoplay class="w-full h-full object-cover"></video>
        <div class="absolute top-10 text-center">
            <h2 id="caller-display" class="text-2xl font-bold">Calling...</h2>
        </div>
        <button onclick="endCall()" class="absolute bottom-10 bg-red-600 p-5 rounded-full text-white shadow-2xl">Hang Up</button>
    </div>

    <script>
        const peer = new Peer();
        let currentConn = null;
        let activeId = null;
        let contacts = JSON.parse(localStorage.getItem('vibe_contacts') || '{}');

        // INITIALIZE
        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            renderContacts();
        });

        // RECOGNIZE INCOMING CALLS
        peer.on('call', call => {
            const callerId = call.metadata.callerId;
            const name = contacts[callerId] ? "Vibe Friend" : callerId.substring(0,8);
            
            if(confirm(`Incoming call from ${name}. Accept?`)) {
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    call.answer(stream);
                    document.getElementById('call-screen').classList.remove('hidden');
                    call.on('stream', s => document.getElementById('remote-video').srcObject = s);
                });
            }
        });

        // RECOGNIZE INCOMING TEXT/CONNECTION
        peer.on('connection', conn => {
            saveContact(conn.peer);
            setupConnection(conn);
        });

        function addNewContact() {
            const id = prompt("Enter Receiver Vibe Number:");
            if(id) {
                saveContact(id);
                openChat(id);
            }
        }

        function saveContact(id) {
            if(!contacts[id]) {
                contacts[id] = { id: id, history: [] };
                localStorage.setItem('vibe_contacts', JSON.stringify(contacts));
                renderContacts();
            }
        }

        function renderContacts() {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            Object.keys(contacts).forEach(id => {
                const div = document.createElement('div');
                div.className = "p-4 flex items-center gap-3 cursor-pointer hover:bg-[#202c33] border-b border-[#222d34]";
                div.onclick = () => openChat(id);
                div.innerHTML = `
                    <div class="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center">👤</div>
                    <div class="flex-1">
                        <div class="flex justify-between"><span class="font-bold text-sm">${id.substring(0,8)}</span></div>
                        <p class="text-xs text-gray-500 truncate">Tap to keep the vibe going...</p>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function openChat(id) {
            activeId = id;
            document.getElementById('sidebar').classList.add('hidden', 'md:flex');
            document.getElementById('chat-panel').classList.remove('hidden');
            document.getElementById('active-contact-name').innerText = id.substring(0,12) + "...";
            document.getElementById('chat-messages').innerHTML = '';
            
            // Load history
            contacts[id].history.forEach(m => addMessageToUI(m.text, m.type, m.sender));

            if(!currentConn || currentConn.peer !== id) {
                currentConn = peer.connect(id);
                setupConnection(currentConn);
            }
        }

        function closeChat() {
            document.getElementById('chat-panel').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
        }

        function setupConnection(conn) {
            currentConn = conn;
            conn.on('data', data => {
                saveMessage(conn.peer, data.content, data.type, 'them');
                if(activeId === conn.peer) addMessageToUI(data.content, data.type, 'them');
            });
        }

        function sendText() {
            const val = document.getElementById('msg-input').value;
            if(currentConn && val) {
                const packet = { type: 'text', content: val };
                currentConn.send(packet);
                saveMessage(activeId, val, 'text', 'me');
                addMessageToUI(val, 'text', 'me');
                document.getElementById('msg-input').value = '';
            }
        }

        function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const packet = { type: 'image', content: e.target.result };
                currentConn.send(packet);
                saveMessage(activeId, packet.content, 'image', 'me');
                addMessageToUI(packet.content, 'image', 'me');
            };
            reader.readAsDataURL(file);
        }

        function saveMessage(contactId, content, type, sender) {
            contacts[contactId].history.push({ text: content, type: type, sender: sender });
            localStorage.setItem('vibe_contacts', JSON.stringify(contacts));
        }

        function addMessageToUI(content, type, sender) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `p-2 px-3 text-sm shadow-sm max-w-[80%] ${sender === 'me' ? 'wa-message-me self-end' : 'wa-message-them self-start'}`;
            
            if(type === 'image') {
                div.innerHTML = `<img src="${content}" class="rounded-lg max-w-full">`;
            } else {
                div.innerText = content;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function makeCall(type) {
            if(!activeId) return;
            navigator.mediaDevices.getUserMedia({video: type === 'video', audio: true}).then(stream => {
                const call = peer.call(activeId, stream, { metadata: { callerId: peer.id } });
                document.getElementById('call-screen').classList.remove('hidden');
                call.on('stream', s => document.getElementById('remote-video').srcObject = s);
            });
        }

        function endCall() { location.reload(); }
    </script>
</body>
</html>
